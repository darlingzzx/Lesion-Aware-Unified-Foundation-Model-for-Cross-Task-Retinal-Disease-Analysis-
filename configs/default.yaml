# ============================================================================
# RetLesionUni Default Configuration
# All paths are relative to this config file's parent directory (project root).
# ============================================================================

# --- Data paths ----------------------------------------------------------
data:
  root: "data"
  ddr_root: "data/DDR dataset"
  odir_root: "data/ODIR"
  label_mapping: "data/label_mapping.json"
  preprocessed_cache: "outputs/preprocessed"

  # DDR sub-directory names
  ddr_detection_dir: "lesion_detection"
  ddr_segmentation_dir: "lesion_segmentation"

  # ODIR annotation file pattern: {split}_annotations.xlsx
  odir_annotation_pattern: "{split}_annotations.xlsx"

  splits: ["train", "valid", "test"]

# --- Model ---------------------------------------------------------------
model:
  backbone: "vit_large_patch16_224"   # ViT-Large from timm
  pretrained: true                                # Load RetFound pretrained weights
  pretrained_path: "pretrained/RETFound_cfp_weights.pth"
  img_size: 512
  patch_size: 16
  hidden_dim: 1024
  num_layers: 24
  num_heads: 16
  mlp_ratio: 4

  # Multi-level feature extraction layers (1-indexed, 1-24)
  multilevel_layers: [12, 18, 24]

  # Position embedding interpolation
  pos_embed_interp: "bilinear"      # bilinear / bicubic

  # Task heads
  odir_num_classes: 8
  ddr_num_classes: 5                # bg + EX/HE/MA/SE

  # LPM (Lesion Perception Module)
  lpm:
    enabled: true
    lambda_lesion: 100.0  # KL loss scale; raw KL≈5e-4 @T=0.1, target L_les≈0.005~0.05

  # CTAM (Cross-Task Alignment Module)
  ctam:
    enabled: true
    proj_dim: 256
    cross_attn_heads: 8
    residual_alpha: 0.5
    temperature: 0.07
    lambda_align: 0.05

# --- Losses --------------------------------------------------------------
loss:
  odir:
    type: "asymmetric"
    gamma_pos: 1.0
    gamma_neg: 4.0
  ddr:
    type: "dice_ce"
    dice_weight: 0.7
    ce_weight: 0.3
    # Inverse-frequency weights: BG=99.4%, EX=0.19%, HE=0.35%, MA=0.02%, SE=0.07%
    class_weights: [0.1, 5.0, 5.0, 10.0, 5.0]

# --- Training ------------------------------------------------------------
training:
  # Stage 1: warmup with frozen backbone
  stage1:
    epochs: 5
    lr: 0.001
    freeze_ratio: 0.7
    use_lpm: false
    use_ctam: false

  # Stage 2: full fine-tuning
  stage2:
    epochs: 10
    lr: 0.0001
    freeze_ratio: 0.0
    use_lpm: true
    use_ctam: true
    warmup_epochs: 3               # Linear warmup for L_lesion and L_align

  optimizer: "adamw"
  betas: [0.9, 0.999]
  weight_decay: 0.0001
  scheduler: "cosine"

  batch_size_odir: 4
  batch_size_ddr: 4
  num_workers: 0   # Set to 0 on Windows to avoid DataLoader multiprocessing deadlocks
  pin_memory: true

  # Weighted sampling for DR-positive ODIR samples
  dr_positive_min_per_batch: 1
  dr_positive_weight: 3.0

  gradient_clip: 1.0
  gradient_accumulation_steps: 2   # Simulate larger batch without OOM (effective batch=4×2=8)
  mixed_precision: "bf16"          # no / fp16 / bf16  (bf16 avoids fp16 overflow in DDR decoder)
  gradient_checkpointing: true     # Trade compute for memory (saves ~30-50% VRAM)
  val_freq: 5                      # Validate every N epochs (saves ~20% time)

  # Checkpointing
  checkpoint:
    save_best: true
    save_every_n_epochs: 2
    monitor_metric: "ddr_mDice"
    monitor_mode: "max"
    resume: true   # Auto-resume from last checkpoint on restart

# --- Reproducibility -----------------------------------------------------
seed: 42

# --- Logging -------------------------------------------------------------
logging:
  tensorboard: true
  log_dir: "outputs/logs"
  print_interval: 10

# --- Experiment ----------------------------------------------------------
exp_name: "retlesionuni_full"
output_dir: "outputs"
